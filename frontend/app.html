<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MindMate 💙</title>

<script defer src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    margin: 0;
    background: #f5f7fb;
}

header {
    padding: 15px 40px;
    background: white;
    font-size: 22px;
    font-weight: 600;
    color: #4f6ef7;
}
.container {
    display: flex;
    min-height: calc 100vh;
    padding: 20px;
    gap: 20px;
}
.chat-section {
    flex: 2.2;
    background: rgb(245, 149, 149);
    border-radius: 16px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    height: 90vh; /* ✅ important */
}

#chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    border-radius: 10px;
    background: #f1f3ff;
    margin-top: 10px;
}
.chat-input {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.camera-section {
    flex: 1;
    background: white;
    padding: 15px;
}

video {
    width: 100%;
}
</style>
</head>

<body>

<header>MindMate 💙</header>

<div class="container">

<div class="chat-section">
<h2>Hello 👋 I'm MindMate</h2>
<div id="chat-box"></div>
<div class="chat-input">
    <input type="text" id="userInput" placeholder="Type your message..." />
    <button onclick="sendMessage()">Send</button>
</div>

</div>

<div class="camera-section">
<h3>Camera</h3>
<video id="video" autoplay muted></video>
<p id="faceStatus">Starting...</p>
</div>

</div>

<script>
let moodSent = false;

const video = document.getElementById("video");
const faceStatus = document.getElementById("faceStatus");
const chatBox = document.getElementById("chat-box");
async function sendMessage() {
    const input = document.getElementById("userInput");
    const message = input.value.trim();

    if (message === "") return;

    // Show user message
    const userMsg = document.createElement("p");
    userMsg.innerHTML = "<b>You:</b> " + message;
    chatBox.appendChild(userMsg);

    input.value = "";

    try {
        // 🔥 SEND TO FLASK BACKEND
        const response = await fetch("http://127.0.0.1:5000/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ text: message })
        });

        const data = await response.json();

        // ✅ SHOW REAL AI RESPONSE
        addMessage(data.reply);

    } catch (error) {
        console.log("Error:", error);
        addMessage("⚠️ Server not responding");
    }

    chatBox.scrollTop = chatBox.scrollHeight;
}

/* ADD MESSAGE */
function addMessage(msg) {
    chatBox.innerHTML += `<p><b>MindMate:</b> ${msg}</p>`;
    chatBox.scrollTop = chatBox.scrollHeight;
}

/* HANDLE MOOD */
function handleMood(mood) {
    console.log("Mood:", mood);

    if (mood === "happy") {
        addMessage("You look happy 😊 That’s nice to see!");
    }
    else if (mood === "sad") {
        addMessage("You look a bit down… I’m here for you 💙");
    }
    else if (mood === "angry") {
        addMessage("You seem stressed… want to talk?");
    }
    else {
        addMessage("Hi 😊 I see you. How are you feeling?");
    }
}

/* CAMERA */
async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
    faceStatus.innerText = "Camera active";
}

/* LOAD MODELS */
async function loadModels() {
    await faceapi.nets.tinyFaceDetector.loadFromUri("models");
    await faceapi.nets.faceExpressionNet.loadFromUri("models");
    console.log("Models loaded");
}

/* FACE DETECTION */
function detectFace() {
    setInterval(async () => {

        if (video.readyState !== 4) return;

        const result = await faceapi
            .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
            .withFaceExpressions();

        if (!result) {
            faceStatus.innerText = "No face detected";
            moodSent = false;
            return;
        }

        faceStatus.innerText = "Face detected";

        const expressions = result.expressions;

        const mood = Object.keys(expressions).reduce((a, b) =>
            expressions[a] > expressions[b] ? a : b
        );

        // Send ONLY once
        if (!moodSent) {
            handleMood(mood);
            moodSent = true;
        }

    }, 2000);
}

/* INIT */
async function init() {
    await startCamera();
    await loadModels();
    detectFace();
}

init();
</script>

</body>
</html>
